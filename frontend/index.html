<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuotesMind · AI Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <!-- Noise overlay -->
  <div class="noise" aria-hidden="true"></div>

  <!-- Grid overlay -->
  <div class="grid-overlay" aria-hidden="true"></div>

  <!-- Floating particles (populated by JS) -->
  <div class="particles-wrap" id="particlesWrap" aria-hidden="true"></div>

  <main class="app-wrapper">

    <!-- Header -->
    <header class="chat-header">
      <div class="bot-identity">
        <div class="avatar-ring">
          <div class="avatar-core">
            <span class="avatar-icon">✦</span>
          </div>
          <div class="status-dot"></div>
        </div>
        <div class="bot-info">
          <h1 class="bot-name">QuotesMind <span class="beta-tag">AI</span></h1>
          <p class="bot-status"><span class="pulse-dot"></span> Online · Powered by Rasa NLP</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="Clear chat" id="clearBtn" aria-label="Clear chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages area -->
    <section class="chat-messages" id="chatMessages" aria-live="polite" aria-label="Chat messages">
      <!-- Welcome screen — removed by JS on first message -->
      <div class="welcome-msg" id="welcomeScreen">
        <span class="welcome-icon">✦</span>
        <h2>Hello, I'm QuotesMind</h2>
        <p>Share how you're feeling or what you need.<br/>I'll find the perfect quote for you.</p>
      </div>
    </section>

    <!-- Suggested prompts -->
    <div class="suggestions" id="suggestions">
      <button class="chip" data-msg="I'm feeling sad today">😔 Feeling sad</button>
      <button class="chip" data-msg="Motivate me">🔥 Motivate me</button>
      <button class="chip" data-msg="Tell me about love">💜 About love</button>
      <button class="chip" data-msg="Hello">👋 Say hello</button>
    </div>

    <!-- Input area -->
    <footer class="chat-input-area">
      <div class="input-wrapper" id="inputWrapper">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Share what's on your mind…"
          rows="1"
          maxlength="500"
          aria-label="Type your message"
        ></textarea>
        <button class="send-btn" id="sendBtn" aria-label="Send message" title="Send">
          <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
    </footer>

  </main>

  <script src="app.js"></script>
</body>
</html>
